name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Test
        run: go test ./src/internal/...

      - name: Build
        run: go build -v ./src/cmd/cssmark

      - name: Test example
        run: |
          ./cssmark validate examples/tokens.css
          ./cssmark build examples/tokens.css -o test-output.json
          ./cssmark docs examples/tokens.css -o test-docs
          test -f test-output.json
          test -f test-docs/index.html
