name: Publish npm

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      github.repository == 'artmsilva/cssmark' && 
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@artmsilva'

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            # Get tag from the release workflow run
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          fi
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package version
        working-directory: npm
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p npm/bin
          VERSION=${{ steps.version.outputs.VERSION }}
          
          # Download all platform binaries from the release
          gh release download "v${VERSION}" \
            --pattern "cssmark_${VERSION}_*.tar.gz" \
            --pattern "cssmark_${VERSION}_*.zip" \
            --dir ./tmp
          
          # Extract and organize binaries
          mkdir -p npm/bin/darwin-arm64 npm/bin/darwin-x64 npm/bin/linux-x64 npm/bin/linux-arm64 npm/bin/win32-x64
          
          # Darwin arm64
          if [ -f "tmp/cssmark_${VERSION}_darwin_arm64.tar.gz" ]; then
            tar -xzf "tmp/cssmark_${VERSION}_darwin_arm64.tar.gz" -C npm/bin/darwin-arm64
          fi
          
          # Darwin amd64
          if [ -f "tmp/cssmark_${VERSION}_darwin_amd64.tar.gz" ]; then
            tar -xzf "tmp/cssmark_${VERSION}_darwin_amd64.tar.gz" -C npm/bin/darwin-x64
          fi
          
          # Linux amd64
          if [ -f "tmp/cssmark_${VERSION}_linux_amd64.tar.gz" ]; then
            tar -xzf "tmp/cssmark_${VERSION}_linux_amd64.tar.gz" -C npm/bin/linux-x64
          fi
          
          # Linux arm64
          if [ -f "tmp/cssmark_${VERSION}_linux_arm64.tar.gz" ]; then
            tar -xzf "tmp/cssmark_${VERSION}_linux_arm64.tar.gz" -C npm/bin/linux-arm64
          fi
          
          # Windows amd64
          if [ -f "tmp/cssmark_${VERSION}_windows_amd64.zip" ]; then
            unzip -o "tmp/cssmark_${VERSION}_windows_amd64.zip" -d npm/bin/win32-x64
          fi
          
          rm -rf tmp

      - name: Copy README
        run: cp README.md npm/

      - name: Publish to GitHub Packages
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
